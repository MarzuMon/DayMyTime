    <!-- Inline critical CSS for above-the-fold content + hero skeleton -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0}
      body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:#f5f6f8;color:#1a1f2e}
      .dark body,body.dark{background:#111318;color:#e8eaf0}
      #root{min-height:100vh;contain:layout style}
      @media(prefers-color-scheme:dark){body{background:#111318;color:#e8eaf0}}
      @media(max-width:767px){#root{padding-bottom:56px}}
      img[alt="DayMyTime"]{width:36px;height:36px}

      /* Hero skeleton — shown instantly, hidden once React mounts */
      #hero-skeleton{position:fixed;top:0;left:0;right:0;z-index:40;pointer-events:none}
      #hero-skeleton .hs-nav{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;max-width:1152px;margin:0 auto;border-bottom:1px solid rgba(0,0,0,0.06)}
      #hero-skeleton .hs-logo{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,#1e3a8a22,#1e3a8a11)}
      #hero-skeleton .hs-btn{width:80px;height:32px;border-radius:12px;background:linear-gradient(135deg,#1e3a8a,#2563eb);opacity:0.7}
      #hero-skeleton .hs-body{max-width:1152px;margin:0 auto;padding:96px 16px 40px;text-align:center}
      @media(min-width:640px){#hero-skeleton .hs-body{padding-top:160px}}
      #hero-skeleton .hs-badge{display:inline-block;width:180px;height:28px;border-radius:9999px;background:rgba(30,58,138,0.08);margin-bottom:16px}
      #hero-skeleton .hs-h1{font-family:'Space Grotesk','DM Sans',system-ui,sans-serif;font-size:clamp(1.875rem,5vw,3.75rem);font-weight:700;line-height:1.1;margin-bottom:16px;color:#1a1f2e}
      @media(prefers-color-scheme:dark){#hero-skeleton .hs-h1{color:#e8eaf0}}
      #hero-skeleton .hs-h1 span{background:linear-gradient(135deg,#1e3a8a,#2563eb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
      #hero-skeleton .hs-sub{color:#6b7280;font-size:clamp(1rem,2.5vw,1.25rem);max-width:32rem;margin:0 auto 24px}
      #hero-skeleton .hs-cta{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;border-radius:12px;background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;font-weight:600;font-size:1rem;text-decoration:none}
      #root:not(:empty) ~ #hero-skeleton{display:none}
    </style>

    <!-- AdSense - deferred to reduce TBT: loads on first user interaction -->
    <script>
      (function(){
        var loaded = false;
        function loadAds() {
          if (loaded) return;
          loaded = true;
          var s = document.createElement('script');
          s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4393861879798471';
          s.async = true;
          s.crossOrigin = 'anonymous';
          document.head.appendChild(s);
        }
        ['scroll','click','touchstart','keydown'].forEach(function(e){
          addEventListener(e, loadAds, {once:true, passive:true});
        });
      })();
    </script>

    <!-- Razorpay - lazy loaded only when needed -->
    <script>
      window.loadRazorpay = function() {
        if (window.Razorpay) return Promise.resolve();
        return new Promise(function(resolve) {
          var s = document.createElement('script');
          s.src = 'https://checkout.razorpay.com/v1/checkout.js';
          s.onload = resolve;
          document.head.appendChild(s);
        });
      };
    </script>
